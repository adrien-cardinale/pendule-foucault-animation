<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Pendule de Foucault Animation</title>
  <style>
    body {
      margin: 0;
    }

    .controls {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      padding: 10px 12px;
      border-radius: 8px;
      font-family: sans-serif;
      font-size: 14px;
    }

    .controls label {
      display: block;
      margin-bottom: 8px;
    }

    .controls input {
      width: 220px;
    }
  </style>
</head>

<body>
  <div class="controls">
    <label for="latitude-slider">Latitude: <span id="latitude-value">47°</span></label>
    <input id="latitude-slider" type="range" min="-90" max="90" step="1" value="47">
    <label for="longitude-slider">Longitude: <span id="longitude-value">0°</span></label>
    <input id="longitude-slider" type="range" min="-180" max="180" step="1" value="0">
  </div>
  <script type="module" src="/main.js"></script>
</body>

</html>
